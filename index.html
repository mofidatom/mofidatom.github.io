<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتم - مدرسه مفید یادگار امام</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
                   RESET & BASE
                ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --green: #2ecc71;
            --green-dark: #1a7a42;
            --green-glow: rgba(46, 204, 113, 0.15);
            --red: #e74c3c;
            --red-dark: #922b21;
            --red-glow: rgba(231, 76, 60, 0.12);
            --blue: #3498db;
            --blue-dark: #1a5276;
            --blue-glow: rgba(52, 152, 219, 0.12);
            --bg: #0b0f1a;
            --bg-card: rgba(15, 25, 40, 0.75);
            --text: #d4e6f1;
            --text-muted: #7f8c9b;
            --border: rgba(52, 152, 219, 0.08);
            --shadow: rgba(0, 0, 0, 0.5);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            line-height: 1.7;
            font-weight: 400;
        }

        /* ============================================================
                   SCROLLBAR
                ============================================================ */
        ::-webkit-scrollbar {
            width: 6px;
            background: var(--bg);
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--green), var(--blue));
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--green-dark), var(--blue-dark));
        }

        /* ============================================================
                   FLOATING ATOMS BACKGROUND
                ============================================================ */
        .atoms-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .atom {
            position: absolute;
            border-radius: 50%;
            opacity: 0.06;
            animation: floatAtom linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
        }

        .atom:hover {
            opacity: 0.12;
        }

        .atom .nucleus {
            width: 22%;
            height: 22%;
            border-radius: 50%;
            box-shadow: 0 0 40px currentColor;
        }

        .atom .orbit {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            animation: spinOrbit linear infinite;
        }

        .atom .orbit-1 {
            width: 85%;
            height: 85%;
            animation-duration: 10s;
        }
        .atom .orbit-2 {
            width: 60%;
            height: 60%;
            animation-duration: 14s;
            animation-direction: reverse;
        }
        .atom .orbit-3 {
            width: 35%;
            height: 35%;
            animation-duration: 7s;
        }

        /* Atom color variations */
        .atom-green .nucleus {
            background: radial-gradient(circle, #58d68d, var(--green-dark));
            color: var(--green);
        }
        .atom-green .orbit {
            border: 1px solid rgba(46, 204, 113, 0.12);
        }
        .atom-green .orbit-2 {
            border-color: rgba(46, 204, 113, 0.08);
        }
        .atom-green .orbit-3 {
            border-color: rgba(46, 204, 113, 0.06);
        }

        .atom-red .nucleus {
            background: radial-gradient(circle, #ec7063, var(--red-dark));
            color: var(--red);
        }
        .atom-red .orbit {
            border: 1px solid rgba(231, 76, 60, 0.12);
        }
        .atom-red .orbit-2 {
            border-color: rgba(231, 76, 60, 0.08);
        }
        .atom-red .orbit-3 {
            border-color: rgba(231, 76, 60, 0.06);
        }

        .atom-blue .nucleus {
            background: radial-gradient(circle, #5dade2, var(--blue-dark));
            color: var(--blue);
        }
        .atom-blue .orbit {
            border: 1px solid rgba(52, 152, 219, 0.12);
        }
        .atom-blue .orbit-2 {
            border-color: rgba(52, 152, 219, 0.08);
        }
        .atom-blue .orbit-3 {
            border-color: rgba(52, 152, 219, 0.06);
        }

        @keyframes floatAtom {
            0%   { transform: translate(0, 0) rotate(0deg); }
            20%  { transform: translate(45px, -55px) rotate(72deg); }
            40%  { transform: translate(-35px, 75px) rotate(144deg); }
            60%  { transform: translate(55px, 35px) rotate(216deg); }
            80%  { transform: translate(-45px, -45px) rotate(288deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        @keyframes spinOrbit {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Atom positions */
        .atom-0 { width: 180px; height: 180px; top: 3%; left: 3%; animation-duration: 24s; }
        .atom-1 { width: 130px; height: 130px; bottom: 8%; right: 2%; animation-duration: 30s; animation-delay: -6s; }
        .atom-2 { width: 220px; height: 220px; top: 35%; left: 72%; animation-duration: 32s; animation-delay: -11s; }
        .atom-3 { width: 90px; height: 90px; top: 72%; left: 10%; animation-duration: 22s; animation-delay: -4s; }
        .atom-4 { width: 160px; height: 160px; top: 12%; left: 42%; animation-duration: 28s; animation-delay: -8s; }
        .atom-5 { width: 110px; height: 110px; bottom: 22%; right: 22%; animation-duration: 26s; animation-delay: -13s; }
        .atom-6 { width: 260px; height: 260px; top: 48%; left: -4%; animation-duration: 38s; animation-delay: -3s; opacity: 0.04; }
        .atom-7 { width: 150px; height: 150px; bottom: 3%; right: 48%; animation-duration: 20s; animation-delay: -9s; }
        .atom-8 { width: 200px; height: 200px; top: 8%; right: 18%; animation-duration: 27s; animation-delay: -16s; }
        .atom-9 { width: 120px; height: 120px; bottom: 32%; left: 58%; animation-duration: 23s; animation-delay: -5s; }
        .atom-10 { width: 160px; height: 160px; top: 58%; right: 4%; animation-duration: 34s; animation-delay: -10s; }
        .atom-11 { width: 100px; height: 100px; top: 22%; right: 38%; animation-duration: 21s; animation-delay: -7s; }

        /* ============================================================
                   NAVIGATION
                ============================================================ */
        .main-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(11, 15, 26, 0.88);
            backdrop-filter: blur(16px) saturate(1.2);
            -webkit-backdrop-filter: blur(16px) saturate(1.2);
            border-bottom: 1px solid rgba(52, 152, 219, 0.06);
            padding: 0 2rem;
            transition: all 0.4s ease;
        }

        .main-nav.scrolled {
            background: rgba(11, 15, 26, 0.95);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.4rem;
            font-weight: 900;
            cursor: pointer;
            text-decoration: none;
            user-select: none;
            transition: transform 0.3s ease;
        }

        .nav-brand:hover {
            transform: scale(1.02);
        }

        .brand-icon {
            font-size: 1.9rem;
            color: var(--blue);
            filter: drop-shadow(0 0 12px rgba(52, 152, 219, 0.2));
            transition: all 0.4s ease;
        }

        .nav-brand:hover .brand-icon {
            transform: rotate(25deg) scale(1.05);
            filter: drop-shadow(0 0 20px rgba(52, 152, 219, 0.3));
        }

        .brand-text {
            background: linear-gradient(135deg, #58d68d, #5dade2, #ec7063);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }

        .brand-text span {
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 0.5rem;
        }

        .nav-menu a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            position: relative;
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--green), var(--blue), var(--red));
            transition: all 0.4s ease;
            transform: translateX(-50%);
            border-radius: 10px;
        }

        .nav-menu a:hover::after,
        .nav-menu a.active::after {
            width: 60%;
        }

        .nav-menu a:hover {
            color: var(--text);
            background: rgba(52, 152, 219, 0.04);
        }

        .nav-menu a.active {
            color: var(--text);
            background: rgba(52, 152, 219, 0.06);
        }

        .nav-menu .nav-icon {
            font-size: 1.1rem;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        .nav-menu a:hover .nav-icon,
        .nav-menu a.active .nav-icon {
            opacity: 1;
        }

        /* ============================================================
                   MAIN CONTENT
                ============================================================ */
        .main-content {
            margin-top: 72px;
            padding: 2.5rem 2rem;
            min-height: calc(100vh - 72px);
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        /* ============================================================
                   PAGES
                ============================================================ */
        .page {
            display: none;
            position: relative;
            z-index: 1;
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 3.5rem 4rem;
            max-width: 1050px;
            width: 100%;
            box-shadow: 
                0 30px 80px var(--shadow),
                0 0 60px rgba(52, 152, 219, 0.02),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
            animation: pageFadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transition: all 0.4s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes pageFadeIn {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .page:hover {
            border-color: rgba(52, 152, 219, 0.12);
            box-shadow: 
                0 30px 80px var(--shadow),
                0 0 80px rgba(52, 152, 219, 0.03),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        /* ============================================================
                   HOME PAGE
                ============================================================ */
        .home-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
        }

        .home-header .header-icon {
            font-size: 3.2rem;
            line-height: 1;
            color: var(--blue);
            filter: drop-shadow(0 0 30px rgba(52, 152, 219, 0.15));
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(52, 152, 219, 0.1)); }
            50% { filter: drop-shadow(0 0 40px rgba(52, 152, 219, 0.2)); }
        }

        .home-header h1 {
            font-size: 2.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #58d68d, #5dade2, #ec7063);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .home-header .sub-badge {
            font-size: 0.95rem;
            color: var(--text-muted);
            background: rgba(52, 152, 219, 0.06);
            padding: 0.3rem 1.4rem;
            border-radius: 60px;
            border: 1px solid rgba(52, 152, 219, 0.06);
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* Badges */
        .badge-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 2.5rem;
        }

        .badge {
            background: rgba(15, 25, 40, 0.4);
            border: 1px solid rgba(52, 152, 219, 0.06);
            border-radius: 60px;
            padding: 0.5rem 1.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .badge:hover {
            border-color: rgba(52, 152, 219, 0.15);
            background: rgba(15, 25, 40, 0.6);
            transform: translateY(-2px);
        }

        .badge .icon {
            font-size: 1.3rem;
            transition: transform 0.3s ease;
        }

        .badge:hover .icon {
            transform: scale(1.1) rotate(5deg);
        }

        .badge strong {
            color: var(--text);
            font-weight: 700;
        }

        /* Main Title */
        .title-area {
            margin: 1.8rem 0 1.2rem;
            position: relative;
        }

        .title-area .main-title {
            font-size: 3.4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f0b27a, #ec7063, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
        }

        .title-area .main-title::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--green), var(--blue), var(--red));
            border-radius: 10px;
            opacity: 0.3;
        }

        .title-area .sub-title {
            font-size: 1.15rem;
            color: var(--text-muted);
            margin-top: 0.6rem;
            background: rgba(52, 152, 219, 0.03);
            display: inline-block;
            padding: 0.2rem 2rem;
            border-radius: 60px;
            border: 1px solid rgba(52, 152, 219, 0.04);
            font-weight: 300;
        }

        /* ============================================================
                   GAME CATEGORIES
                ============================================================ */
        .game-categories {
            margin: 2.8rem 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 1.5rem;
        }

        .game-card {
            background: rgba(15, 25, 40, 0.3);
            border: 1px solid rgba(52, 152, 219, 0.04);
            border-radius: 24px;
            padding: 2rem 1.4rem;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.02), rgba(52, 152, 219, 0.02), rgba(231, 76, 60, 0.02));
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .game-card:hover::before {
            opacity: 1;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(52, 152, 219, 0.12);
            background: rgba(20, 35, 55, 0.4);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        .game-card .game-icon {
            font-size: 3.2rem;
            margin-bottom: 0.8rem;
            display: block;
            transition: transform 0.5s ease;
        }

        .game-card:hover .game-icon {
            transform: scale(1.15) rotate(-5deg);
        }

        .game-card h3 {
            font-size: 1.1rem;
            color: var(--text);
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .game-card p {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .game-card .game-tag {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.2rem 1.2rem;
            border-radius: 60px;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .game-card .tag-green {
            background: rgba(46, 204, 113, 0.08);
            color: var(--green);
            border: 1px solid rgba(46, 204, 113, 0.08);
        }

        .game-card .tag-blue {
            background: rgba(52, 152, 219, 0.08);
            color: var(--blue);
            border: 1px solid rgba(52, 152, 219, 0.08);
        }

        .game-card .tag-red {
            background: rgba(231, 76, 60, 0.08);
            color: var(--red);
            border: 1px solid rgba(231, 76, 60, 0.08);
        }

        .game-card .tag-gold {
            background: rgba(241, 196, 15, 0.08);
            color: #f1c40f;
            border: 1px solid rgba(241, 196, 15, 0.08);
        }

        .game-card:hover .game-tag {
            transform: scale(1.05);
        }

        /* ============================================================
                   TOURNAMENTS PAGE
                ============================================================ */
        .page-title {
            font-size: 2.6rem;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(135deg, #58d68d, #5dade2, #ec7063);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .page-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-weight: 300;
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        .tournaments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 1.8rem;
        }

        .tournament-card {
            background: rgba(15, 25, 40, 0.3);
            border: 1px solid rgba(52, 152, 219, 0.04);
            border-radius: 24px;
            padding: 2.2rem 1.8rem;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .tournament-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 0 0 10px 10px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .tournament-card:hover::before {
            opacity: 1;
        }

        .tournament-card.active-card::before {
            background: linear-gradient(90deg, var(--green), #58d68d);
            opacity: 0.6;
        }

        .tournament-card.upcoming-card::before {
            background: linear-gradient(90deg, var(--blue), #5dade2);
            opacity: 0.6;
        }

        .tournament-card.ended-card::before {
            background: linear-gradient(90deg, var(--red), #ec7063);
            opacity: 0.6;
        }

        .tournament-card:hover {
            transform: translateY(-8px);
            border-color: rgba(52, 152, 219, 0.1);
            background: rgba(20, 35, 55, 0.4);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .tournament-card .t-icon {
            font-size: 2.6rem;
            margin-bottom: 0.8rem;
            display: block;
            transition: transform 0.4s ease;
        }

        .tournament-card:hover .t-icon {
            transform: scale(1.1) rotate(-8deg);
        }

        .tournament-card h3 {
            font-size: 1.05rem;
            color: var(--text);
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        .tournament-card p {
            color: var(--text-muted);
            font-size: 0.82rem;
            font-weight: 300;
            margin-bottom: 1.2rem;
        }

        .t-status {
            display: inline-block;
            padding: 0.3rem 1.4rem;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .tournament-card:hover .t-status {
            transform: scale(1.05);
        }

        .t-status.active-status {
            background: rgba(46, 204, 113, 0.08);
            color: var(--green);
            border: 1px solid rgba(46, 204, 113, 0.1);
        }

        .t-status.upcoming-status {
            background: rgba(52, 152, 219, 0.08);
            color: var(--blue);
            border: 1px solid rgba(52, 152, 219, 0.1);
        }

        .t-status.ended-status {
            background: rgba(231, 76, 60, 0.08);
            color: var(--red);
            border: 1px solid rgba(231, 76, 60, 0.1);
        }

        /* ============================================================
                   ABOUT PAGE
                ============================================================ */
        .about-content {
            text-align: right;
            line-height: 2;
        }

        .about-content .about-intro {
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 1.5rem;
            padding-right: 1rem;
            border-right: 3px solid var(--blue);
            opacity: 0.9;
        }

        .about-content p {
            margin-bottom: 1.2rem;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 300;
        }

        .about-content .highlight {
            color: var(--text);
            font-weight: 700;
            padding: 0 4px;
        }

        .about-content .highlight-green {
            color: var(--green);
            font-weight: 700;
        }

        .about-content .highlight-blue {
            color: var(--blue);
            font-weight: 700;
        }

        .about-content .highlight-red {
            color: var(--red);
            font-weight: 700;
        }

        .about-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1.5rem;
            margin: 2.2rem 0 2rem;
        }

        .about-feature {
            background: rgba(15, 25, 40, 0.2);
            padding: 1.6rem 1.2rem;
            border-radius: 20px;
            border: 1px solid rgba(52, 152, 219, 0.04);
            text-align: center;
            transition: all 0.4s ease;
        }

        .about-feature:hover {
            background: rgba(20, 35, 55, 0.3);
            border-color: rgba(52, 152, 219, 0.08);
            transform: translateY(-4px);
        }

        .about-feature .f-icon {
            font-size: 2.2rem;
            display: block;
            margin-bottom: 0.5rem;
            transition: transform 0.4s ease;
        }

        .about-feature:hover .f-icon {
            transform: scale(1.1) rotate(-5deg);
        }

        .about-feature h4 {
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 700;
        }

        .about-feature p {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
            font-weight: 300;
        }

        .about-quote {
            background: rgba(52, 152, 219, 0.03);
            border: 1px solid rgba(52, 152, 219, 0.04);
            border-radius: 20px;
            padding: 1.5rem 2rem;
            margin-top: 1.5rem;
            text-align: center;
            font-style: italic;
            color: var(--text-muted);
            font-weight: 300;
            font-size: 1rem;
        }

        .about-quote strong {
            color: var(--text);
            font-style: normal;
        }

        /* ============================================================
                   INFO BOX
                ============================================================ */
        .info-box {
            margin: 1.8rem 0 1.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            background: rgba(52, 152, 219, 0.02);
            padding: 0.8rem 1.2rem;
            border-radius: 18px;
            border: 1px solid rgba(52, 152, 219, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            font-weight: 300;
        }

        .info-box .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin: 0 4px;
            animation: dotPulse 2s ease-in-out infinite;
        }

        .info-box .dot-green {
            background: var(--green);
        }
        .info-box .dot-blue {
            background: var(--blue);
            animation-delay: 0.3s;
        }
        .info-box .dot-red {
            background: var(--red);
            animation-delay: 0.6s;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ============================================================
                   FOOTER
                ============================================================ */
        .footer {
            margin-top: 2.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            border-top: 1px solid rgba(52, 152, 219, 0.04);
            padding-top: 2rem;
        }

        .footer .footer-row {
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .footer .footer-row span {
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
        }

        .footer .footer-row span:hover {
            color: var(--text);
        }

        .footer .footer-row .icon {
            font-size: 1rem;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .footer .footer-row span:hover .icon {
            opacity: 1;
        }

        .footer .credit {
            font-size: 0.78rem;
            color: rgba(127, 140, 155, 0.4);
            letter-spacing: 0.5px;
            padding: 0.4rem 1.8rem;
            background: rgba(52, 152, 219, 0.02);
            border-radius: 60px;
            border: 1px solid rgba(52, 152, 219, 0.02);
            font-weight: 300;
            transition: all 0.3s ease;
        }

        .footer .credit:hover {
            color: var(--text-muted);
            border-color: rgba(52, 152, 219, 0.04);
        }

        .footer .credit .heart {
            color: var(--red);
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        .footer .credit:hover .heart {
            opacity: 1;
        }

        .footer .credit .heart-green {
            color: var(--green);
            opacity: 0.6;
        }

        .footer .credit:hover .heart-green {
            opacity: 1;
        }

                padding: 2.5rem 2.5rem;
            }
            
            .home-header h1 {
                font-size: 2.2rem;
            }
            
            .title-area .main-title {
                font-size: 2.8rem;
            }
